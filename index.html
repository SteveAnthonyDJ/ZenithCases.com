<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050607">
  <meta name="description" content="Zenith Cases – website under construction.">
  <title>Zenith Cases | Under Construction</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #050607; }
    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    img {
      display: block;
      width: 100vw;
      height: 100svh;
      object-fit: contain;
      object-position: center;
    }
    @media (max-width: 600px) {
      body { overflow: auto; }
      img {
        width: 100%;
        height: auto;
        min-height: 100svh;
        object-fit: contain;
      }
    }
  </style>
</head>
<body>
  <img src="assets/under-construction.png" alt="Zenith Cases website under construction">
</body>
</html>
